<div class="ussd-hero-bg">
  <div class="ussd-wrap-main">
    
    <!-- Phone Simulator -->
    <div class="ussd-phone-mockup">
      <div class="ussd-status-bar">
        <span class="status-left"><i class="fas fa-signal" style="color:#4a90e2;"></i> ASTS Uganda</span>
        <span class="status-right"><i class="fas fa-battery-full" style="color:#4cd964;"></i> 100%</span>
      </div>
      
      <div class="ussd-screen-container">
        <div class="ussd-screen-text" id="uscr">A Smart Transport System Uganda<br>Dial *123# to begin</div>
      </div>
      
      <div class="ussd-input-group">
        <input class="ussd-mock-input" id="uinp" placeholder="Type option..." onkeydown="if(event.key==='Enter')sendUSSD()"/>
        <button class="ussd-send-btn" onclick="sendUSSD()">Send <i class="fas fa-caret-right"></i></button>
      </div>
      
      <div class="ussd-numpad">
        <button class="ukey-btn" onclick="appendUSSD('1')">1</button>
        <button class="ukey-btn" onclick="appendUSSD('2')">2</button>
        <button class="ukey-btn" onclick="appendUSSD('3')">3</button>
        <button class="ukey-btn" onclick="appendUSSD('4')">4</button>
        <button class="ukey-btn" onclick="appendUSSD('5')">5</button>
        <button class="ukey-btn" onclick="appendUSSD('6')">6</button>
        <button class="ukey-btn" onclick="appendUSSD('7')">7</button>
        <button class="ukey-btn" onclick="appendUSSD('8')">8</button>
        <button class="ukey-btn" onclick="appendUSSD('9')">9</button>
        <button class="ukey-btn" onclick="appendUSSD('*')">*</button>
        <button class="ukey-btn" onclick="appendUSSD('0')">0</button>
        <button class="ukey-btn" onclick="appendUSSD('#')">#</button>
      </div>

      <div class="ussd-action-row">
        <button class="ukey-action back" onclick="clearUSSD()"><i class="fas fa-delete-left"></i></button>
        <div class="ukey-spacer"></div>
        <button class="ukey-action ok" onclick="sendUSSD()">OK <i class="fas fa-caret-right"></i></button>
      </div>
    </div>
    
  </div>
</div>
