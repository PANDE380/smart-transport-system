<div class="srv-hero">
  <div class="srv-hero-inner">
    <div class="hero-live" style="margin-bottom:14px; background: rgba(255,194,0,0.1); border-color: rgba(255,194,0,0.25); color: var(--yellow);"><span></span>24/7 SUPPORT AVAILABLE</div>
    <h1>Contact STS Team</h1>
    <p>Have questions or need assistance? Our dedicated support team is here to help you navigate your journey.</p>
  </div>
</div>

<div class="wrap">
  <div class="booking-layout reveal">
    <div>
      <div class="sh"><h3><i class="fas fa-headset"></i> Get in Touch</h3></div>
      <div class="srv-grid" style="grid-template-columns: 1fr; gap:20px; margin-bottom:30px;">
        <div class="srv-card" style="padding:20px; display:flex; gap:20px; align-items:center;">
          <div class="srv-icon-wrap" style="width:50px; height:50px; flex-shrink:0;"><i class="fas fa-phone"></i></div>
          <div>
            <h4 style="margin-bottom:4px;">Helpline</h4>
            <div style="font-weight:700; color:var(--yellow); font-size:1.1rem;">+256 800 123 456</div>
          </div>
        </div>
        <div class="srv-card" style="padding:20px; display:flex; gap:20px; align-items:center;">
          <div class="srv-icon-wrap" style="width:50px; height:50px; flex-shrink:0;"><i class="fas fa-envelope"></i></div>
          <div>
            <h4 style="margin-bottom:4px;">Email Support</h4>
            <div style="font-weight:700; color:var(--yellow); font-size:1.1rem;">support@sts.ug</div>
          </div>
        </div>
        <div class="srv-card" style="padding:20px; display:flex; gap:20px; align-items:center;">
          <div class="srv-icon-wrap" style="width:50px; height:50px; flex-shrink:0;"><i class="fas fa-location-dot"></i></div>
          <div>
            <h4 style="margin-bottom:4px;">Headquarters</h4>
            <div style="font-weight:700; color:var(--yellow); font-size:1.1rem;">Plot 12, Kampala Road, Kampala, Uganda</div>
          </div>
        </div>
      </div>
    </div>

    <div class="bpanel" style="padding:30px; border-color:var(--yellow); background:rgba(255,194,0,0.02);">
      <h3><i class="fas fa-paper-plane"></i> Send a Message</h3>
      <div class="fg"><label class="fl">Subject</label><input class="fi" placeholder="Feedback / Inquiry"/></div>
      <div class="fg"><label class="fl">Message</label><textarea class="fi" style="height:120px; resize:none;" placeholder="How can we help?"></textarea></div>
      <button class="btn-full" style="background:var(--yellow); color:#000; font-weight:800;" onclick="showT('✅','Message sent! We will contact you soon.','var(--yellow)')">Send Message</button>
    </div>
  </div>
</div>
